<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion - MultiJeuxGo</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <style>
    .auth-box { max-width:400px; margin:40px auto; background:#1a1828; border-radius:16px; padding:32px; border:1px solid #2e2b45; }
    .auth-box h2 { text-align:center; margin-bottom:20px; color:#a67cff; font-size:22px; }
    .auth-input { width:100%; padding:12px 14px; border-radius:10px; border:1px solid #7c5cbf; background:#0f0e17; color:white; font-family:'Nunito',sans-serif; font-size:14px; margin-bottom:12px; box-sizing:border-box; }
    .auth-btn { width:100%; padding:13px; border-radius:50px; border:none; background:#7c5cbf; color:white; font-family:'Nunito',sans-serif; font-size:15px; font-weight:800; cursor:pointer; margin-bottom:10px; }
    .auth-btn:hover { background:#a67cff; }
    .switch-link { text-align:center; color:#9b96b8; font-size:13px; margin-top:8px; }
    .switch-link a { color:#a67cff; cursor:pointer; font-weight:700; }
    .error-msg { color:#ff6b6b; text-align:center; font-size:13px; margin-bottom:10px; min-height:18px; }
    .success-msg { color:#4ecdc4; text-align:center; font-size:13px; margin-bottom:10px; }
  </style>
</head>
<body>
  <header>
    <div class="logo"><a href="index.html" style="color:white;text-decoration:none;">Multi<span style="color:#a67cff">Jeux</span>Go</a></div>
  </header>

  <div class="auth-box">
    <h2 id="titre">👋 Connexion</h2>
    <p class="error-msg" id="erreur"></p>
    <p class="success-msg" id="succes" style="display:none;"></p>
    <input class="auth-input" id="pseudo" type="text" placeholder="Ton pseudo" style="display:none"/>
    <input class="auth-input" id="email" type="email" placeholder="Ton email"/>
    <input class="auth-input" id="password" type="password" placeholder="Mot de passe"/>
    <button class="auth-btn" id="btn-action" onclick="action()">Se connecter</button>
    <div class="switch-link">
      <span id="switch-text">Pas de compte ? </span>
      <a onclick="toggle()" id="switch-link">Créer un compte</a>
    </div>
  </div>

  <script type="module">
    import { auth, db } from './firebase.js';
    import { createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
    import { doc, setDoc } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';

    // Initialiser EmailJS
    emailjs.init('o5hdXmTLWv-jKysyX');

    let modeInscription = false;

    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = 'index.html';
    });

    window.toggle = function() {
      modeInscription = !modeInscription;
      document.getElementById('titre').textContent = modeInscription ? '🎮 Créer un compte' : '👋 Connexion';
      document.getElementById('btn-action').textContent = modeInscription ? 'Créer mon compte' : 'Se connecter';
      document.getElementById('switch-text').textContent = modeInscription ? 'Déjà un compte ? ' : 'Pas de compte ? ';
      document.getElementById('switch-link').textContent = modeInscription ? 'Se connecter' : 'Créer un compte';
      document.getElementById('pseudo').style.display = modeInscription ? 'block' : 'none';
      document.getElementById('erreur').textContent = '';
    };

    window.action = async function() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const pseudo = document.getElementById('pseudo').value.trim();
      const erreur = document.getElementById('erreur');
      const succes = document.getElementById('succes');
      erreur.textContent = '';
      succes.style.display = 'none';

      if (!email || !password) { erreur.textContent = 'Remplis tous les champs !'; return; }

      try {
        if (modeInscription) {
          if (!pseudo) { erreur.textContent = 'Entre ton pseudo !'; return; }
          if (password.length < 6) { erreur.textContent = 'Mot de passe trop court (6 caractères min) !'; return; }

          // Créer le compte Firebase
          const result = await createUserWithEmailAndPassword(auth, email, password);

          // Sauvegarder le profil
          await setDoc(doc(db, 'users', result.user.uid), {
            pseudo: pseudo,
            email: email,
            amis: [],
            createdAt: new Date()
          });

          // Envoyer email de notification à Berkan
          const date = new Date().toLocaleString('fr-FR');
          emailjs.send('service_dp6rmrl', 'template_dtx39bp', {
            pseudo: pseudo,
            email: email,
            date: date
          }).then(() => {
            console.log('Email envoyé à Berkan !');
          }).catch((err) => {
            console.log('Erreur email:', err);
          });

          succes.style.display = 'block';
          succes.textContent = '✅ Compte créé ! Bienvenue ' + pseudo + ' !';
          setTimeout(() => { window.location.href = 'index.html'; }, 1500);

        } else {
          await signInWithEmailAndPassword(auth, email, password);
          window.location.href = 'index.html';
        }
      } catch(e) {
        if (e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential') erreur.textContent = 'Email ou mot de passe incorrect !';
        else if (e.code === 'auth/user-not-found') erreur.textContent = 'Aucun compte avec cet email !';
        else if (e.code === 'auth/email-already-in-use') erreur.textContent = 'Email déjà utilisé !';
        else if (e.code === 'auth/invalid-email') erreur.textContent = 'Email invalide !';
        else erreur.textContent = 'Erreur : ' + e.message;
      }
    };
  </script>
</body>
</html>
