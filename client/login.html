<!DOCTYPE html><html lang='fr'><head><meta charset='UTF-8'/><meta name='viewport' content='width=device-width, initial-scale=1.0'/><title>Connexion - MultiJeuxGo</title><link rel='stylesheet' href='style.css'/><style>.auth-box{max-width:400px;margin:60px auto;background:#1a1828;border-radius:16px;padding:32px;border:1px solid #2e2b45;}.auth-box h2{text-align:center;margin-bottom:24px;color:#a67cff;}.auth-input{width:100%;padding:12px;border-radius:8px;border:1px solid #7c5cbf;background:#0f0e17;color:white;font-size:14px;margin-bottom:14px;box-sizing:border-box;}.auth-btn{width:100%;padding:12px;border-radius:50px;border:none;background:#7c5cbf;color:white;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:10px;}.auth-btn:hover{background:#a67cff;}.switch-link{text-align:center;color:#9b96b8;font-size:14px;margin-top:10px;}.switch-link a{color:#a67cff;cursor:pointer;text-decoration:none;}.error-msg{color:#ff6b6b;text-align:center;font-size:13px;margin-bottom:10px;min-height:20px;}</style></head><body><header><div class='logo'><a href='index.html' style='color:white;text-decoration:none;'>Multi<span style='color:#a67cff'>Jeux</span>Go</a></div></header><div class='auth-box'><h2 id='titre'>Connexion</h2><p class='error-msg' id='erreur'></p><input class='auth-input' id='pseudo' type='text' placeholder='Ton pseudo' style='display:none'/><input class='auth-input' id='email' type='email' placeholder='Ton email'/><input class='auth-input' id='password' type='password' placeholder='Mot de passe'/><button class='auth-btn' id='btn-action' onclick='action()'>Se connecter</button><div class='switch-link'><span id='switch-text'>Pas de compte ? </span><a onclick='toggle()' id='switch-link'>Creer un compte</a></div></div><script type='module'>import { auth, db } from './firebase.js'; import { createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js'; import { doc, setDoc } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js'; let modeInscription = false; onAuthStateChanged(auth, (user) => { if (user) window.location.href = 'index.html'; }); window.toggle = function() { modeInscription = !modeInscription; document.getElementById('titre').textContent = modeInscription ? 'Creer un compte' : 'Connexion'; document.getElementById('btn-action').textContent = modeInscription ? 'Creer mon compte' : 'Se connecter'; document.getElementById('switch-text').textContent = modeInscription ? 'Deja un compte ? ' : 'Pas de compte ? '; document.getElementById('switch-link').textContent = modeInscription ? 'Se connecter' : 'Creer un compte'; document.getElementById('pseudo').style.display = modeInscription ? 'block' : 'none'; }; window.action = async function() { const email = document.getElementById('email').value; const password = document.getElementById('password').value; const pseudo = document.getElementById('pseudo').value; const erreur = document.getElementById('erreur'); try { if (modeInscription) { if (!pseudo) { erreur.textContent = 'Entre ton pseudo !'; return; } const result = await createUserWithEmailAndPassword(auth, email, password); await setDoc(doc(db, 'users', result.user.uid), { pseudo: pseudo, email: email, amis: [], createdAt: new Date() }); window.location.href = 'index.html'; } else { await signInWithEmailAndPassword(auth, email, password); window.location.href = 'index.html'; } } catch(e) { if(e.code === 'auth/wrong-password') erreur.textContent = 'Mot de passe incorrect !'; else if(e.code === 'auth/user-not-found') erreur.textContent = 'Email introuvable !'; else if(e.code === 'auth/email-already-in-use') erreur.textContent = 'Email deja utilise !'; else erreur.textContent = 'Erreur : ' + e.message; } };</script></body></html>
