<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat - MultiJeuxGo</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .chat-box { max-width:600px; margin:20px auto; background:#1a1828; border-radius:16px; border:1px solid #2e2b45; display:flex; flex-direction:column; height:80vh; }
    .chat-header { padding:16px 20px; border-bottom:1px solid #2e2b45; display:flex; align-items:center; justify-content:space-between; }
    .messages { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; }
    .message { max-width:70%; padding:10px 14px; border-radius:12px; font-size:14px; }
    .message.moi { background:#7c5cbf; align-self:flex-end; border-bottom-right-radius:4px; }
    .message.autre { background:#2e2b45; align-self:flex-start; border-bottom-left-radius:4px; }
    .message .auteur { font-size:11px; opacity:0.7; margin-bottom:4px; }
    .chat-input { padding:16px; border-top:1px solid #2e2b45; display:flex; gap:8px; }
    .chat-input input { flex:1; padding:10px 14px; border-radius:50px; border:1px solid #7c5cbf; background:#0f0e17; color:white; font-size:14px; }
    .chat-input button { padding:10px 20px; border-radius:50px; border:none; background:#7c5cbf; color:white; font-weight:700; cursor:pointer; }
  </style>
</head>
<body>
  <header>
    <div class="logo"><a href="index.html" style="color:white;text-decoration:none;">Multi<span style="color:#a67cff">Jeux</span>Go</a></div>
    <a href="index.html" style="padding:8px 16px;border-radius:50px;border:none;background:#2e2b45;color:white;font-weight:700;text-decoration:none;">Retour</a>
  </header>
  <div class="chat-box">
    <div class="chat-header">
      <span style="font-weight:700;">💬 Chat Global</span>
      <span id="nb-messages" style="color:#4ecdc4;font-size:13px;"></span>
    </div>
    <div class="messages" id="messages">
      <p style="color:#9b96b8;text-align:center;">Chargement des messages...</p>
    </div>
    <div class="chat-input">
      <input id="msg-input" type="text" placeholder="Ecris un message..."
        onkeypress="if(event.key==='Enter') envoyerMsg()"/>
      <button onclick="envoyerMsg()">Envoyer</button>
    </div>
  </div>
  <script type="module">
    import { auth, db } from './firebase.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
    import { collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';
    let currentUser = null;
    let monPseudo = 'Joueur';
    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = 'login.html'; return; }
      currentUser = user;
      const snap = await getDoc(doc(db, 'users', user.uid));
      if (snap.exists()) monPseudo = snap.data().pseudo || 'Joueur';
      const q = query(collection(db, 'messages'), orderBy('createdAt'));
      onSnapshot(q, (snapshot) => {
        const container = document.getElementById('messages');
        container.innerHTML = '';
        snapshot.forEach((d) => {
          const m = d.data();
          const div = document.createElement('div');
          div.classList.add('message');
          if (m.uid === currentUser.uid) div.classList.add('moi');
          else div.classList.add('autre');
          div.innerHTML = '<div class="auteur">' + m.pseudo + '</div><div>' + m.texte + '</div>';
          container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
        document.getElementById('nb-messages').textContent = snapshot.size + ' messages';
      });
    });
    window.envoyerMsg = async function() {
      const input = document.getElementById('msg-input');
      const texte = input.value.trim();
      if (!texte || !currentUser) return;
      await addDoc(collection(db, 'messages'), {
        texte: texte,
        pseudo: monPseudo,
        uid: currentUser.uid,
        createdAt: serverTimestamp()
      });
      input.value = '';
    };
  </script>
</body>
</html>
