<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Puissance 4 - MultiJeuxGo</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body { background: #0f0e17; color: white; font-family: 'Nunito', sans-serif; }
    .jeu-container { padding: 16px; max-width: 480px; margin: 0 auto; text-align: center; }
    .lobby-box { background: #1a1828; border-radius: 16px; padding: 24px; margin-bottom: 16px; border: 1px solid #2e2b45; }
    .lobby-box input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #7c5cbf; background: #0f0e17; color: white; font-family: 'Nunito', sans-serif; font-size: 14px; margin-bottom: 10px; box-sizing: border-box; }
    .lobby-box button { width: 100%; padding: 12px; border-radius: 50px; border: none; background: #7c5cbf; color: white; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 15px; cursor: pointer; margin-bottom: 8px; }
    .code-display { background: #0f0e17; border-radius: 10px; padding: 14px; margin: 10px 0; font-size: 28px; font-weight: 900; color: #a67cff; letter-spacing: 4px; }
    .grille { display: grid; grid-template-columns: repeat(7, 42px); gap: 6px; background: #1a1828; padding: 14px; border-radius: 16px; margin: 12px auto; width: fit-content; border: 1px solid #2e2b45; }
    .case { width: 42px; height: 42px; border-radius: 50%; background: #0f0e17; cursor: pointer; transition: all 0.15s; border: 2px solid #2e2b45; display: block; }
    .case:hover { background: #2e2b45; }
    .case.rouge { background: #ff6b6b !important; border-color: #ff4444; }
    .case.jaune { background: #ffd93d !important; border-color: #ffcc00; }
    .status-bar { background: #1a1828; border-radius: 10px; padding: 12px; margin: 8px 0; font-weight: 700; font-size: 14px; border: 1px solid #2e2b45; }
    .joueurs-bar { display: flex; justify-content: space-around; align-items: center; margin: 10px 0; }
    .joueur-info { background: #1a1828; border-radius: 10px; padding: 10px 16px; font-size: 13px; font-weight: 700; border: 2px solid #2e2b45; }
    .joueur-info.actif { border-color: #a67cff; background: #2a1f4a; }
    .gagnant-msg { font-size: 22px; font-weight: 900; color: #ffd93d; margin: 10px 0; }
    .btn-rejouer { padding: 12px 28px; border-radius: 50px; border: none; background: #7c5cbf; color: white; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 15px; cursor: pointer; margin-top: 10px; }
  </style>
</head>
<body>
  <header>
    <div class="logo"><a href="index.html" style="color:white;text-decoration:none;">Multi<span style="color:#a67cff">Jeux</span>Go</a></div>
    <span style="font-size:24px;">🔴</span>
  </header>

  <div class="jeu-container">

    <div id="lobby">
      <div class="lobby-box">
        <h2 style="color:#a67cff;margin-bottom:16px;">🔴 Puissance 4</h2>
        <input id="pseudo" type="text" placeholder="Ton pseudo"/>
        <button onclick="creerPartie()">🚀 Créer une partie</button>
        <div style="color:#9b96b8;font-size:13px;margin:8px 0;">— ou —</div>
        <input id="code-input" type="text" placeholder="Code de la salle" style="letter-spacing:3px;text-transform:uppercase;text-align:center;"/>
        <button onclick="rejoindrePartie()" style="background:#2e2b45;">🔗 Rejoindre avec un code</button>
      </div>
    </div>

    <div id="attente" style="display:none;">
      <div class="lobby-box">
        <h3 style="color:#a67cff;margin-bottom:12px;">✅ Salle créée !</h3>
        <p style="color:#9b96b8;margin-bottom:8px;">Partage ce code avec ton ami :</p>
        <div class="code-display" id="code-affiche">----</div>
        <p style="color:#9b96b8;font-size:13px;margin-top:8px;">⏳ En attente d'un joueur...</p>
      </div>
    </div>

    <div id="jeu" style="display:none;">
      <div class="joueurs-bar">
        <div class="joueur-info" id="info-j1">🔴 <span id="nom-j1">J1</span></div>
        <div style="font-weight:900;color:#9b96b8;">VS</div>
        <div class="joueur-info" id="info-j2">🟡 <span id="nom-j2">J2</span></div>
      </div>
      <div class="status-bar" id="status">...</div>
      <div class="gagnant-msg" id="gagnant-msg" style="display:none;"></div>
      <div class="grille" id="grille"></div>
      <button class="btn-rejouer" id="btn-rejouer" onclick="rejouer()" style="display:none;">🔄 Rejouer</button>
    </div>

  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    const socket = io('https://multijeuxgo.onrender.com');
    const COLS = 7, ROWS = 6;
    let plateau = [];
    let monTour = false;
    let maCouleur = '';
    let codePartie = '';
    let monPseudo = '';
    let partieTerminee = false;

    function creerGrille() {
      const grille = document.getElementById('grille');
      grille.innerHTML = '';
      plateau = [];
      for (let r = 0; r < ROWS; r++) {
        plateau[r] = [];
        for (let c = 0; c < COLS; c++) {
          plateau[r][c] = null;
          const div = document.createElement('div');
          div.classList.add('case');
          div.dataset.row = r;
          div.dataset.col = c;
          div.addEventListener('click', () => jouerColonne(c));
          grille.appendChild(div);
        }
      }
      console.log('Grille créée avec ' + document.querySelectorAll('.case').length + ' cases');
    }

    function creerPartie() {
      monPseudo = document.getElementById('pseudo').value.trim();
      if (!monPseudo) { alert('Entre ton pseudo !'); return; }
      maCouleur = 'rouge';
      socket.emit('creer_salle', { pseudo: monPseudo, jeu: 'puissance4' });
    }

    function rejoindrePartie() {
      monPseudo = document.getElementById('pseudo').value.trim();
      const code = document.getElementById('code-input').value.trim().toUpperCase();
      if (!monPseudo) { alert('Entre ton pseudo !'); return; }
      if (!code) { alert('Entre le code !'); return; }
      maCouleur = 'jaune';
      codePartie = code;
      socket.emit('rejoindre_salle', { pseudo: monPseudo, code: code });
    }

    socket.on('salle_creee', (data) => {
      codePartie = data.code;
      document.getElementById('code-affiche').textContent = data.code;
      document.getElementById('lobby').style.display = 'none';
      document.getElementById('attente').style.display = 'block';
    });

    socket.on('joueur_rejoint', (data) => {
      console.log('joueur_rejoint reçu !', data);
      document.getElementById('lobby').style.display = 'none';
      document.getElementById('attente').style.display = 'none';
      document.getElementById('jeu').style.display = 'block';
      document.getElementById('nom-j1').textContent = data.joueurs[0] || 'J1';
      document.getElementById('nom-j2').textContent = data.joueurs[1] || 'J2';
      creerGrille();
      partieTerminee = false;
      if (maCouleur === 'rouge') {
        monTour = true;
        document.getElementById('status').textContent = '🔴 Ton tour ! Clique sur une colonne';
        document.getElementById('info-j1').classList.add('actif');
      } else {
        monTour = false;
        document.getElementById('status').textContent = '🔴 ' + data.joueurs[0] + ' commence...';
        document.getElementById('info-j1').classList.add('actif');
      }
    });

    function jouerColonne(col) {
      if (!monTour || partieTerminee) return;
      for (let r = ROWS - 1; r >= 0; r--) {
        if (!plateau[r][col]) {
          placerPiece(r, col, maCouleur);
          const gagne = verifierVictoire(r, col, maCouleur);
          socket.emit('jouer_coup', {
            code: codePartie,
            coup: { row: r, col: col, couleur: maCouleur, gagnant: gagne ? monPseudo : null },
            pseudo: monPseudo
          });
          monTour = false;
          if (gagne) {
            partieTerminee = true;
            afficherGagnant(monPseudo);
          } else {
            const adversaire = maCouleur === 'rouge' ? document.getElementById('nom-j2').textContent : document.getElementById('nom-j1').textContent;
            document.getElementById('status').textContent = (maCouleur === 'jaune' ? '🟡' : '🔴') + ' Tour de ' + adversaire + '...';
            toggleActif();
          }
          break;
        }
      }
    }

    socket.on('coup_recu', (data) => {
      placerPiece(data.coup.row, data.coup.col, data.coup.couleur);
      if (data.coup.gagnant) {
        partieTerminee = true;
        document.getElementById('gagnant-msg').style.display = 'block';
        document.getElementById('gagnant-msg').textContent = '😢 ' + data.coup.gagnant + ' a gagné !';
        document.getElementById('status').textContent = 'Meilleure chance la prochaine fois !';
        document.getElementById('btn-rejouer').style.display = 'inline-block';
      } else {
        monTour = true;
        document.getElementById('status').textContent = (maCouleur === 'rouge' ? '🔴' : '🟡') + ' Ton tour !';
        toggleActif();
      }
    });

    function toggleActif() {
      document.getElementById('info-j1').classList.toggle('actif');
      document.getElementById('info-j2').classList.toggle('actif');
    }

    function placerPiece(row, col, couleur) {
      if (!plateau[row]) plateau[row] = [];
      plateau[row][col] = couleur;
      const cases = document.querySelectorAll('.case');
      const index = row * COLS + col;
      if (cases[index]) {
        cases[index].classList.add(couleur);
        console.log('Pièce placée en', row, col, couleur);
      }
    }

    function verifierVictoire(row, col, couleur) {
      const directions = [[0,1],[1,0],[1,1],[1,-1]];
      for (const [dr, dc] of directions) {
        let count = 1;
        for (let i = 1; i < 4; i++) {
          const r = row + dr*i, c = col + dc*i;
          if (r>=0&&r<ROWS&&c>=0&&c<COLS&&plateau[r][c]===couleur) count++;
          else break;
        }
        for (let i = 1; i < 4; i++) {
          const r = row - dr*i, c = col - dc*i;
          if (r>=0&&r<ROWS&&c>=0&&c<COLS&&plateau[r][c]===couleur) count++;
          else break;
        }
        if (count >= 4) return true;
      }
      return false;
    }

    function afficherGagnant(pseudo) {
      document.getElementById('gagnant-msg').style.display = 'block';
      document.getElementById('gagnant-msg').textContent = '🏆 ' + pseudo + ' a gagné !';
      document.getElementById('status').textContent = '🎉 Partie terminée !';
      document.getElementById('btn-rejouer').style.display = 'inline-block';
    }

    function rejouer() {
      partieTerminee = false;
      document.getElementById('gagnant-msg').style.display = 'none';
      document.getElementById('btn-rejouer').style.display = 'none';
      creerGrille();
      if (maCouleur === 'rouge') {
        monTour = true;
        document.getElementById('status').textContent = '🔴 Ton tour !';
        document.getElementById('info-j1').classList.add('actif');
        document.getElementById('info-j2').classList.remove('actif');
      } else {
        monTour = false;
        document.getElementById('status').textContent = '⏳ Tour du joueur rouge...';
      }
    }

    socket.on('erreur', (data) => { alert(data.message); });
  </script>
</body>
</html>
