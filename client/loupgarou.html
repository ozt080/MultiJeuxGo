<!DOCTYPE html><html lang='fr'><head><meta charset='UTF-8'/><title>Loup-Garou - MultiJeuxGo</title><link rel='stylesheet' href='style.css'/><script src='https://cdn.socket.io/4.7.2/socket.io.min.js'></script></head><body><header><div class='logo'><a href='index.html' style='color:white;text-decoration:none;'>Multi<span style='color:#a67cff'>Jeux</span>Go</a></div></header><section style='text-align:center;padding:40px 20px;'><div style='font-size:60px;'>&#128058;</div><h2>Loup-Garou</h2><p style='color:#9b96b8;'>3 a 12 joueurs - Decouvrez qui est le loup !</p><input id='pseudo' type='text' placeholder='Ton pseudo' style='padding:10px;border-radius:8px;border:1px solid #7c5cbf;background:#1a1828;color:white;margin:10px;'/><br/><button class='btn-primary' style='padding:12px 28px;border-radius:50px;border:none;background:#7c5cbf;color:white;font-size:16px;font-weight:700;cursor:pointer;margin:10px;' onclick='creerSalle()'>Creer une salle</button><input id='code' type='text' placeholder='Code de la salle' style='padding:10px;border-radius:8px;border:1px solid #7c5cbf;background:#1a1828;color:white;margin:10px;'/><button class='btn-primary' style='padding:12px 28px;border-radius:50px;border:none;background:#7c5cbf;color:white;font-size:16px;font-weight:700;cursor:pointer;margin:10px;' onclick='rejoindre()'>Rejoindre</button><p id='infos' style='color:#a67cff;font-weight:700;margin-top:20px;'></p></section><script src='https://cdn.socket.io/4.7.2/socket.io.min.js'></script><script>const socket=io('https://multijeuxgo.onrender.com');function creerSalle(){const p=document.getElementById('pseudo').value;if(!p){alert('Entre ton pseudo !');return;}socket.emit('creer_salle',{pseudo:p,jeu:'loupgarou'});}socket.on('salle_creee',(d)=>{document.getElementById('infos').textContent='Salle creee ! Code : '+d.code+' - Partage ce code avec tes amis !';});function rejoindre(){const p=document.getElementById('pseudo').value;const c=document.getElementById('code').value;if(!p||!c){alert('Entre ton pseudo et le code !');return;}socket.emit('rejoindre_salle',{pseudo:p,code:c});}socket.on('joueur_rejoint',(d)=>{document.getElementById('infos').textContent='Joueurs : '+d.joueurs.join(', ');})</script></body></html>
