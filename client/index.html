<!DOCTYPE html><html lang='fr'><head><meta charset='UTF-8'/><meta name='viewport' content='width=device-width, initial-scale=1.0'/><title>MultiJeuxGo</title><link rel='stylesheet' href='style.css'/><script src='https://cdn.socket.io/4.7.2/socket.io.min.js'></script></head><body><header><div class='logo'>Multi<span>Jeux</span>Go</div></header><section class='hero'><h1>Joue avec tes amis partout !</h1><p>Des dizaines de jeux, des salles privées ou publiques.</p></section><section class='lobby'><h2>Rejoindre ou créer une salle</h2><input id='pseudo' type='text' placeholder='Ton pseudo'/><select id='jeu'><option value=''>Choisis un jeu</option><option value='echecs'>Echecs</option><option value='puissance4'>Puissance 4</option><option value='loupgarou'>Loup-Garou</option></select><button id='btn-creer' class='btn-primary'>Créer une salle</button><br/><br/><input id='code' type='text' placeholder='Code de la salle'/><button id='btn-rejoindre' class='btn-primary'>Rejoindre</button><br/><br/><p id='code-salle'></p><p id='joueurs'></p></section><section class='games'><h2>Nos jeux</h2><div class='games-grid'><div class='game-card'><div class='game-icon'>chess</div><div class='game-name'>Echecs</div></div><div class='game-card'><div class='game-icon'>circle</div><div class='game-name'>Puissance 4</div></div><div class='game-card'><div class='game-icon'>wolf</div><div class='game-name'>Loup-Garou</div></div><div class='game-card'><div class='game-icon'>anchor</div><div class='game-name'>Bataille Navale</div></div></div></section><script src='app.js'></script></body></html>
